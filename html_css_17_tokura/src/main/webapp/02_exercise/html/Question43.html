<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Question43</title>
		<style>
			.p_red{
				background-color: red;
				padding: 20px;
				
			}
			.p_blue{
				background-color: blue;
				margin:40px;
			}
		</style>
	</head>
	<body>
		<p class="p_red">
			上下左右すべてまとめて20pxのpaddingを指定しています。<br>
			paddingにはマイナス値を指定することはできません。
		</p>
		<p class="p_blue">
			上下左右すべてまとめて40pxのmarginと、<br>
			10pxのpaddingを指定しています。
		</p>
	
	</body>
</html>
