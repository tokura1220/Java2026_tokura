<!DOCTYPE HTML Living Standard>
<html>
	<head>
		<meta charset="UTF-8">
		<title>HTML の演習課題</title>
	</head>
	<body>
		<h2>
			これは&lt;h2&gt;タグで囲まれたテキストです
		</h2>
		<h3>
			これは&lt;h3&gt;タグで囲まれたテキストです
		</h3>
		これはただの&nbsp;&nbsp;テキスト&nbsp;&nbsp;です。
		<p>
			これは&lt;p&gt;タグで
			<br>囲まれたテキストです
		</p>
		<ul>
			
			<li>1つ目の項目</li>
			<li>2つ目の項目</li>
			<li>3つ目の項目</li>
		</ul>
		<ol>
			<li>1つ目の項目</li>
			<li>2つ目の項目</li>
			<li>3つ目の項目</li>
		</ol>
	</body>
</html>
