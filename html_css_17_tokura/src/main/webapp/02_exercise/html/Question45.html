<!DOCTYPE html>

				会社/サービス名のロゴや各ページへのリンクを主に設置します<br>
			</header>

					ページの本文記事を配信するメインの部分です
					<div class="pack">コンテンツ1</div>
					<div class="pack">コンテンツ2</div>
					<div class="pack">コンテンツ3</div>

					同じカテゴリ内のページへ誘導するリンクやバナーを設置します<br>

				コピーライトやサイトマップ、関連企業へのリンクなどを主に設置します<br>
