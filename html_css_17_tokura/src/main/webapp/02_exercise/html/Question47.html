<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Question 47</title>
	</head>
	<body>
		<p>
			<table border="1px">
				<tr>
					<td>
						お名前
					</td>	
					<td>
						<input type="text" name="type" size="38"/>
					</td>
				</tr>
				<tr>
					<td>
						お住いの住所
					</td>
					<td>
						<select name="area">
						<option value="1">北海道・東北</option>
						<option value="2">関東</option>
						<option value="3">中部</option>
						<option value="4">関西</option>
						<option value="5">中国・四国</option>
						<option value="6">九州・沖縄</option>
					</select>
					</td>
				</tr>
				<tr>
					<td>
						電話
						
					</td>
					<td>
						<input type="number" name="phone" size="38"/>
					</td>
				</tr>
				<tr>
					<td>
						Eメール
					</td>
					<td>
						<input type="email" name="mail" size="38"/>
					</td>
				</tr>
				<tr>
					<td>
						お問い合わせ種類
					</td>
					<td>
						<label><input type="radio" name="type" value="1" />商品について</label>
						<label><input type="radio" name="type" value="2" />当サイトについて</label>
					</td>
				</tr>
				<tr>
					<td>
						お問い合わせ内容
					</td>
					<td>
						<textarea name="detail" cols="30" rows="5"></textarea>
					</td>
				</tr>
			</table>
		</p>
	
	</body>
</html>
